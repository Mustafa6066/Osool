# Railway Configuration for Osool
# ================================
# Single service: Backend API (FastAPI) with in-process APScheduler.
# APScheduler runs weekly cron jobs for property + economic data scraping.
# No separate worker service needed — scrapers run inside the API process.
#
# Schedule:
#   - Property Scraper (Nawy): Sundays 03:00 UTC
#   - Economic Scraper: Sundays 03:30 UTC

[build]
builder = "DOCKERFILE"
dockerfilePath = "backend/Dockerfile"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
