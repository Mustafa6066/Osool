# Railway Configuration — Osool Scraper Cron Service
# ====================================================
# Daily cron: Nawy + Aqarmap, all Egyptian zones, 03:00 UTC.
# Zero LLM tokens — Scrapling only. Health alerts via Redis.

[build]
builder = "DOCKERFILE"
dockerfilePath = "scraper/Dockerfile"

[deploy]
startCommand = "python main.py --mode=cron"
cronSchedule = "0 3 * * *"
restartPolicyType = "NEVER"
