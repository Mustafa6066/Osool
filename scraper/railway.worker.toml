# Railway Configuration — Osool Scraper Redis Worker
# ====================================================
# Long-running service that BLPOPs `scraper:pending` and runs on-demand
# refreshes for the orchestrator. Same Dockerfile as the cron service.

[build]
builder = "DOCKERFILE"
dockerfilePath = "scraper/Dockerfile"

[deploy]
startCommand = "python main.py --mode=worker"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
